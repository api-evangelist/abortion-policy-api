naftiko: 1.0.0-alpha2
info:
  label: Abortion Policy API — Gestational Limits
  description: 'Abortion Policy API — Gestational Limits. 3 operations. Lead operation: Abortion Policy API Get Gestational
    Limits for All States. Self-contained Naftiko capability covering one Abortion Policy Api business surface.'
  tags:
  - Abortion Policy Api
  - Gestational Limits
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ABORTION_POLICY_API_API_KEY: ABORTION_POLICY_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: abortion-policy-gestational-limits
    baseUri: https://api.abortionpolicyapi.com/v1
    description: Abortion Policy API — Gestational Limits business capability. Self-contained, no shared references.
    resources:
    - name: gestational_limits-states
      path: /gestational_limits/states
      operations:
      - name: getgestationallimitsallstates
        method: GET
        description: Abortion Policy API Get Gestational Limits for All States
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: gestational_limits-states-state
      path: /gestational_limits/states/{state}
      operations:
      - name: getgestationallimitsbystate
        method: GET
        description: Abortion Policy API Get Gestational Limits by State
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: state
          in: path
          type: string
          description: The state name (e.g., California, Texas, New York)
          required: true
    - name: gestational_limits-zips-zip
      path: /gestational_limits/zips/{zip}
      operations:
      - name: getgestationallimitsbyzip
        method: GET
        description: Abortion Policy API Get Gestational Limits by Zip Code
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zip
          in: path
          type: string
          description: The 5-digit US zip code
          required: true
    authentication:
      type: apikey
      key: token
      value: '{{env.ABORTION_POLICY_API_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: abortion-policy-gestational-limits-rest
    port: 8080
    description: REST adapter for Abortion Policy API — Gestational Limits. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/gestational-limits/states
      name: gestational-limits-states
      description: REST surface for gestational_limits-states.
      operations:
      - method: GET
        name: getgestationallimitsallstates
        description: Abortion Policy API Get Gestational Limits for All States
        call: abortion-policy-gestational-limits.getgestationallimitsallstates
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/gestational-limits/states/{state}
      name: gestational-limits-states-state
      description: REST surface for gestational_limits-states-state.
      operations:
      - method: GET
        name: getgestationallimitsbystate
        description: Abortion Policy API Get Gestational Limits by State
        call: abortion-policy-gestational-limits.getgestationallimitsbystate
        with:
          state: rest.state
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/gestational-limits/zips/{zip}
      name: gestational-limits-zips-zip
      description: REST surface for gestational_limits-zips-zip.
      operations:
      - method: GET
        name: getgestationallimitsbyzip
        description: Abortion Policy API Get Gestational Limits by Zip Code
        call: abortion-policy-gestational-limits.getgestationallimitsbyzip
        with:
          zip: rest.zip
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: abortion-policy-gestational-limits-mcp
    port: 9090
    transport: http
    description: MCP adapter for Abortion Policy API — Gestational Limits. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: abortion-policy-api-get-gestational
      description: Abortion Policy API Get Gestational Limits for All States
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: abortion-policy-gestational-limits.getgestationallimitsallstates
      outputParameters:
      - type: object
        mapping: $.
    - name: abortion-policy-api-get-gestational-2
      description: Abortion Policy API Get Gestational Limits by State
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: abortion-policy-gestational-limits.getgestationallimitsbystate
      with:
        state: tools.state
      outputParameters:
      - type: object
        mapping: $.
    - name: abortion-policy-api-get-gestational-3
      description: Abortion Policy API Get Gestational Limits by Zip Code
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: abortion-policy-gestational-limits.getgestationallimitsbyzip
      with:
        zip: tools.zip
      outputParameters:
      - type: object
        mapping: $.
