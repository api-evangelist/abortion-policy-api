components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: token
      description: API key for authentication. Request access at https://www.abortionpolicyapi.com/request-access
  schemas:
    GestationalLimits:
      title: GestationalLimits
      description: Abortion restrictions related to gestational limits (bans after certain weeks of pregnancy) for a US state or territory.
      type: object
      properties:
        banned_after_weeks_since_LMP:
          type: integer
          nullable: true
          description: >-
            Weeks since Last Menstrual Period (LMP) after which abortion is banned.
            Null means no gestational restriction. 99 means viability standard. 28 means
            third trimester ban. 0 means complete ban.
          example: 24
        exception_life:
          type: boolean
          description: If true, abortion is permitted when necessary to save the pregnant person's life.
          example: true
        exception_health:
          type: string
          nullable: true
          description: >-
            Health exception type. "Physical" (excluding mental health), "Any" (may include
            mental health), or "Major Bodily Function" (substantial irreversible impairment).
          example: Any
        exception_fetal:
          type: string
          nullable: true
          description: Fetal anomaly exception type. "Serious fetal anomaly" or "Lethal fetal anomaly".
          example: Serious fetal anomaly
        exception_rape_or_incest:
          type: boolean
          description: If true, exceptions may be granted in cases of rape or incest.
          example: true
        Last Updated:
          type: string
          description: Date this policy record was last updated.
          example: '2025-01-15'
    InsuranceCoverage:
      title: InsuranceCoverage
      description: Abortion insurance coverage restrictions covering Medicaid, private insurance, and ACA exchange plans for a US state.
      type: object
      properties:
        requires_coverage:
          type: boolean
          description: If true, state requires private health plans to cover abortion.
          example: false
        private_coverage_no_restrictions:
          type: boolean
          description: If true, private insurance may cover abortion without restrictions.
          example: true
        private_exception_life:
          type: boolean
          description: If true, private insurance coverage allowed when abortion is necessary to save pregnant person's life.
          example: true
        private_exception_health:
          type: string
          nullable: true
          description: Private insurance coverage allowed for serious health conditions described by this field.
          example: Major Bodily Function
        private_exception_fetal:
          type: string
          nullable: true
          description: Private insurance coverage allowed for described fetal anomaly types.
          example: Lethal fetal anomaly
        private_exception_rape_or_incest:
          type: boolean
          description: If true, private insurance coverage allowed in cases of rape or incest.
          example: true
        exchange_coverage_no_restrictions:
          type: boolean
          description: If true, state has not restricted abortion coverage in ACA exchange plans.
          example: true
        exchange_exception_life:
          type: boolean
          description: If true, exchange plan coverage allowed when abortion is necessary to save pregnant person's life.
          example: true
        exchange_exception_health:
          type: string
          nullable: true
          description: Exchange plan coverage allowed for health conditions described by this field.
          example: Physical
        exchange_exception_fetal:
          type: string
          nullable: true
          description: Exchange plan coverage allowed for described fetal anomaly types.
          example: Lethal fetal anomaly
        exchange_exception_rape_or_incest:
          type: boolean
          description: If true, exchange plan coverage allowed in cases of rape or incest.
          example: true
        exchange_forbids_coverage:
          type: boolean
          description: If true, state prohibits all exchange insurance coverage for abortion.
          example: false
        medicaid_coverage_provider_patient_decision:
          type: boolean
          description: If true, state uses Medicaid funds for medically necessary abortion determined by patient/provider.
          example: true
        medicaid_exception_life:
          type: boolean
          description: If true, Medicaid covers abortion necessary to save pregnant person's life (required by Hyde Amendment).
          example: true
        medicaid_exception_health:
          type: string
          nullable: true
          description: Medicaid coverage for health conditions described by this field.
          example: Physical
        medicaid_exception_fetal:
          type: string
          nullable: true
          description: Medicaid coverage for described fetal anomaly types.
          example: Serious fetal anomaly
        medicaid_exception_rape_or_incest:
          type: boolean
          description: If true, Medicaid covers abortion in cases of rape or incest (required by Hyde Amendment).
          example: true
        Last Updated:
          type: string
          description: Date this policy record was last updated.
          example: '2025-01-15'
    MinorsRestrictions:
      title: MinorsRestrictions
      description: Abortion restrictions that specifically target minors in a US state.
      type: object
      properties:
        below_age:
          type: integer
          nullable: true
          description: Age below which restrictions apply. Null means no restrictions currently enforced.
          example: 18
        parents_required:
          type: integer
          nullable: true
          description: Number of parents required to be notified. 1=one parent, 2=both parents, null=no restrictions.
          example: 1
        parental_consent_required:
          type: boolean
          description: If true, parent(s) must give permission for the minor to have an abortion.
          example: false
        parental_notification_required:
          type: boolean
          description: If true, parent(s) must be told beforehand of the minor's decision.
          example: false
        judicial_bypass_available:
          type: boolean
          description: If true, a judge can excuse a minor from parental consent/notification requirements.
          example: false
        allows_minor_to_consent:
          type: boolean
          description: If true, state explicitly or implicitly allows a minor to consent to abortion.
          example: true
        Last Updated:
          type: string
          description: Date this policy record was last updated.
          example: '2025-01-15'
    WaitingPeriods:
      title: WaitingPeriods
      description: Abortion waiting period restrictions in a US state, covering mandatory time between counseling and abortion care.
      type: object
      properties:
        waiting_period_hours:
          type: integer
          nullable: true
          description: Hours a person must wait between receiving state-mandated counseling and obtaining abortion. Null means no waiting period.
          example: 24
        counseling_visits:
          type: integer
          nullable: true
          description: "1=counseling required by state; 2=counseling must be at the facility, requiring two clinic trips."
          example: 1
        exception_health:
          type: string
          nullable: true
          description: Conditions under which waiting period may be waived.
          example: Medical emergency
        waiting_period_notes:
          type: string
          nullable: true
          description: Additional notes on unusual waiting period policies.
          example: Waiting period waived in medical emergencies.
        counseling_waived_condition:
          type: string
          nullable: true
          description: Conditions under which counseling requirement can be waived.
          example: Medical emergency
        Last Updated:
          type: string
          description: Date this policy record was last updated.
          example: '2025-01-15'
    Error:
      title: Error
      description: Error response returned when a request fails.
      type: object
      properties:
        error:
          type: string
          description: Error message describing what went wrong.
          example: Unauthorized - invalid API key
        status:
          type: integer
          description: HTTP status code.
          example: 401
tags:
  - name: Gestational Limits
    description: Endpoints for retrieving gestational limit abortion policies by state or zip code.
  - name: Insurance Coverage
    description: Endpoints for retrieving abortion insurance coverage restrictions by state or zip code.
  - name: Minors
    description: Endpoints for retrieving abortion restrictions targeting minors by state or zip code.
  - name: Waiting Periods
    description: Endpoints for retrieving abortion waiting period restrictions by state or zip code.
