aid: abortion-policy-api
url: https://raw.githubusercontent.com/api-evangelist/abortion-policy-api/refs/heads/main/apis.yml
name: Abortion Policy API
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Abortion
  - Policies
  - Healthcare
  - Government
description: >-
  The Abortion Policy API provides up-to-date information on US state abortion
  policies that can be integrated into online abortion resources. The API consolidates
  abortion laws into one database across four data tables covering gestational limits,
  insurance coverage, minors restrictions, and waiting periods. Data is accessible by
  US state name or zip code. The project is co-led by Patient Forward and is fiscally
  sponsored by NEO Philanthropy.
